<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抢救车使用手册 · 备考速记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a2342;
  --blue: #1a4a8a;
  --mid-blue: #2563b0;
  --teal: #0891b2;
  --teal-light: #e0f2fe;
  --white: #ffffff;
  --off-white: #f0f6ff;
  --gray-100: #e8eef8;
  --gray-200: #c8d8ee;
  --gray-500: #64748b;
  --gray-700: #334155;
  --gold: #d4a017;
  --success: #059669;
  --danger: #dc2626;
  --text: #0f172a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--off-white);
  color: var(--text);
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 10% 20%, rgba(26,74,138,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(8,145,178,0.06) 0%, transparent 50%);
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 60%, var(--mid-blue) 100%);
  color: white;
  padding: 0;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
}
.header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -30px;
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 24px 28px;
  position: relative;
  z-index: 1;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 12px;
  text-transform: uppercase;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 6px;
}
.header p {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  font-weight: 300;
}

/* ─── NAV TABS ─── */
.nav-tabs {
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.nav-tabs-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  padding: 0 24px;
}
.nav-tab {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-tab:hover { color: rgba(255,255,255,0.8); }
.nav-tab.active {
  color: white;
  border-bottom-color: var(--teal);
}

/* ─── MAIN CONTENT ─── */
.content {
  max-width: 860px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

/* ─── SECTION: HOME ─── */
.home-intro {
  background: white;
  border-radius: 12px;
  border: 1px solid var(--gray-100);
  padding: 20px 24px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.home-intro-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--teal-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.home-intro h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 3px;
}
.home-intro p { font-size: 12.5px; color: var(--gray-500); line-height: 1.5; }

.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.category-card {
  background: white;
  border-radius: 12px;
  border: 1px solid var(--gray-100);
  padding: 20px;
  cursor: pointer;
  transition: all 0.22s;
  position: relative;
  overflow: hidden;
}
.category-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 4px 0 0 4px;
}
.category-card:hover {
  border-color: var(--gray-200);
  box-shadow: 0 4px 20px rgba(10,35,66,0.10);
  transform: translateY(-2px);
}
.cat-0::before { background: var(--mid-blue); }
.cat-1::before { background: var(--teal); }
.cat-2::before { background: #7c3aed; }
.cat-3::before { background: #d97706; }
.cat-4::before { background: var(--success); }

.category-emoji { font-size: 24px; margin-bottom: 10px; }
.category-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.category-sub { font-size: 11.5px; color: var(--gray-500); margin-bottom: 12px; }
.category-count {
  font-size: 11px;
  color: var(--mid-blue);
  font-weight: 500;
  background: var(--teal-light);
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ─── SECTION: FLASHCARDS ─── */
.flashcard-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  background: white;
  cursor: pointer;
  font-size: 13px;
  color: var(--gray-700);
  transition: all 0.18s;
}
.back-btn:hover { background: var(--gray-100); }
.flashcard-section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--navy);
}

.flashcard-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-progress {
  font-size: 12px;
  color: var(--gray-500);
}
.progress-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--gray-100);
  border-radius: 2px;
  margin: 0 16px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--mid-blue));
  border-radius: 2px;
  transition: width 0.3s ease;
}

.flashcard-container {
  perspective: 1200px;
  margin-bottom: 20px;
  cursor: pointer;
}
.flashcard {
  width: 100%;
  min-height: 220px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 14px;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  top: 0; left: 0; right: 0;
  min-height: 220px;
  backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 32px 28px;
  text-align: center;
}
.card-front {
  background: white;
  border: 1.5px solid var(--gray-100);
  box-shadow: 0 2px 20px rgba(10,35,66,0.07);
}
.card-back {
  background: linear-gradient(145deg, var(--navy) 0%, var(--blue) 100%);
  transform: rotateY(180deg);
  color: white;
}
.card-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--teal);
  margin-bottom: 14px;
}
.card-back .card-label { color: rgba(255,255,255,0.5); }
.card-question {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.7;
}
.card-answer {
  font-size: 14.5px;
  line-height: 1.8;
  color: rgba(255,255,255,0.92);
}
.card-hint {
  margin-top: 18px;
  font-size: 11px;
  color: var(--gray-500);
}
.card-back .card-hint { color: rgba(255,255,255,0.35); }

.card-placeholder { min-height: 220px; }

.flashcard-controls {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.ctrl-btn {
  flex: 1;
  max-width: 140px;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid var(--gray-200);
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-700);
  transition: all 0.18s;
  font-family: 'Noto Sans SC', sans-serif;
}
.ctrl-btn:hover { background: var(--gray-100); }
.ctrl-btn.primary {
  background: var(--mid-blue);
  border-color: var(--mid-blue);
  color: white;
}
.ctrl-btn.primary:hover { background: var(--blue); }

/* All cards list below */
.cards-list {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-list-item {
  background: white;
  border: 1px solid var(--gray-100);
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.card-list-item:hover { border-color: var(--gray-200); box-shadow: 0 2px 10px rgba(10,35,66,0.07); }
.card-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--teal-light);
  color: var(--teal);
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.card-list-q { font-size: 13.5px; color: var(--navy); font-weight: 500; line-height: 1.5; }
.card-list-a { font-size: 12px; color: var(--gray-500); margin-top: 4px; line-height: 1.5; display: none; }
.card-list-item.open .card-list-a { display: block; }

/* ─── SECTION: QUIZ ─── */
.quiz-start {
  text-align: center;
  padding: 40px 20px;
}
.quiz-start h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  color: var(--navy);
  margin-bottom: 10px;
}
.quiz-start p { color: var(--gray-500); font-size: 14px; margin-bottom: 24px; }
.quiz-select-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
  text-align: left;
}
.quiz-cat-btn {
  padding: 14px 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  transition: all 0.18s;
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  align-items: center;
  gap: 8px;
}
.quiz-cat-btn:hover, .quiz-cat-btn.selected {
  border-color: var(--mid-blue);
  background: var(--teal-light);
  color: var(--mid-blue);
}
.start-quiz-btn {
  display: inline-block;
  padding: 14px 36px;
  background: linear-gradient(135deg, var(--mid-blue), var(--teal));
  color: white;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: opacity 0.18s;
}
.start-quiz-btn:hover { opacity: 0.9; }

.quiz-question-wrap {
  display: none;
}
.quiz-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.quiz-info { font-size: 13px; color: var(--gray-500); }
.quiz-score-badge {
  background: var(--teal-light);
  color: var(--teal);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}

.quiz-q-card {
  background: white;
  border: 1.5px solid var(--gray-100);
  border-radius: 14px;
  padding: 28px 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 20px rgba(10,35,66,0.06);
}
.quiz-q-tag {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--teal);
  font-weight: 600;
  margin-bottom: 12px;
}
.quiz-q-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  color: var(--navy);
  line-height: 1.7;
  font-weight: 600;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.quiz-option {
  padding: 13px 18px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--gray-700);
  transition: all 0.18s;
  font-family: 'Noto Sans SC', sans-serif;
  text-align: left;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.quiz-option:hover:not(.disabled) { border-color: var(--mid-blue); background: var(--teal-light); }
.quiz-option.correct { border-color: var(--success); background: #f0fdf4; color: var(--success); }
.quiz-option.wrong { border-color: var(--danger); background: #fef2f2; color: var(--danger); }
.quiz-option.disabled { cursor: not-allowed; }
.opt-letter {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--gray-700);
}
.quiz-option.correct .opt-letter { background: var(--success); color: white; }
.quiz-option.wrong .opt-letter { background: var(--danger); color: white; }

.quiz-explanation {
  display: none;
  background: var(--off-white);
  border-left: 3px solid var(--teal);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--gray-700);
  line-height: 1.7;
  margin-bottom: 16px;
}
.quiz-explanation.show { display: block; }
.quiz-explanation strong { color: var(--navy); }

.quiz-next-btn {
  display: none;
  width: 100%;
  padding: 13px;
  background: var(--mid-blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: background 0.18s;
}
.quiz-next-btn:hover { background: var(--blue); }
.quiz-next-btn.show { display: block; }

/* Result screen */
.quiz-result {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.result-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  font-family: 'Noto Serif SC', serif;
  position: relative;
}
.result-circle::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(var(--teal) var(--pct), var(--gray-100) 0);
}
.result-inner {
  position: relative;
  z-index: 1;
  width: 96px; height: 96px;
  background: white;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.result-pct { font-size: 24px; font-weight: 700; color: var(--navy); }
.result-label { font-size: 11px; color: var(--gray-500); }
.result-message {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  color: var(--navy);
  margin-bottom: 8px;
}
.result-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 28px; }
.result-actions { display: flex; gap: 12px; justify-content: center; }
.res-btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: 1.5px solid var(--gray-200);
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-700);
  transition: all 0.18s;
  font-family: 'Noto Sans SC', sans-serif;
}
.res-btn.primary {
  background: var(--mid-blue);
  border-color: var(--mid-blue);
  color: white;
}
.res-btn:hover { opacity: 0.85; }

/* HIDDEN */
.hidden { display: none !important; }

/* Responsive */
@media (max-width: 480px) {
  .nav-tab { padding: 12px 12px; font-size: 12px; }
  .flashcard-controls { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-badge">🚑 急救护理 · 院内培训</div>
    <h1>抢救车使用手册 · 备考速记</h1>
    <p>大连医科大学附属第二医院 · 护理部医务部药学部 · 2023年第二版</p>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tabs-inner">
    <div class="nav-tab active" onclick="showSection('home')">📋 知识点</div>
    <div class="nav-tab" onclick="showSection('cards')">🃏 闪卡</div>
    <div class="nav-tab" onclick="showSection('quiz')">🎯 自测</div>
  </div>
</div>

<div class="content">

  <!-- ══════════════ HOME ══════════════ -->
  <div id="section-home">
    <div class="home-intro">
      <div class="home-intro-icon">💡</div>
      <div>
        <h3>本册核心：抢救车五大模块</h3>
        <p>点击各模块卡片，进入该主题的闪卡学习；或切换至「自测」模式进行随机出题。</p>
      </div>
    </div>
    <div class="categories-grid" id="categories-grid"></div>
  </div>

  <!-- ══════════════ FLASHCARDS ══════════════ -->
  <div id="section-cards" class="hidden">
    <div class="flashcard-header">
      <button class="back-btn" onclick="showSection('home')">← 返回</button>
      <div class="flashcard-section-title" id="fc-title"></div>
    </div>

    <div class="flashcard-nav">
      <span class="card-progress" id="fc-progress">1 / 1</span>
      <div class="progress-bar-wrap"><div class="progress-bar" id="fc-bar" style="width:0%"></div></div>
      <span style="font-size:12px;color:var(--gray-500)">点击卡片翻转</span>
    </div>

    <div class="flashcard-container" onclick="flipCard()">
      <div class="flashcard" id="fc-card">
        <div class="card-face card-front">
          <div class="card-label">问题</div>
          <div class="card-question" id="fc-question"></div>
          <div class="card-hint">👆 点击查看答案</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">答案</div>
          <div class="card-answer" id="fc-answer"></div>
          <div class="card-hint">👆 点击返回问题</div>
        </div>
      </div>
      <div class="card-placeholder"></div>
    </div>

    <div class="flashcard-controls">
      <button class="ctrl-btn" onclick="prevCard()">← 上一张</button>
      <button class="ctrl-btn primary" onclick="nextCard()">下一张 →</button>
    </div>

    <div class="cards-list" id="fc-list"></div>
  </div>

  <!-- ══════════════ QUIZ ══════════════ -->
  <div id="section-quiz" class="hidden">
    <!-- Start screen -->
    <div id="quiz-start">
      <div class="quiz-start">
        <h2>🎯 自测模式</h2>
        <p>选择要考核的场景（可多选），开始随机出题</p>
        <div class="quiz-select-grid" id="quiz-cat-select"></div>
        <button class="start-quiz-btn" onclick="startQuiz()">开始自测</button>
      </div>
    </div>

    <!-- Question screen -->
    <div class="quiz-question-wrap" id="quiz-question-wrap">
      <div class="quiz-top">
        <span class="quiz-info" id="quiz-progress-text">第 1 题 / 共 10 题</span>
        <span class="quiz-score-badge" id="quiz-score-badge">得分: 0</span>
      </div>
      <div class="progress-bar-wrap" style="margin-bottom:20px">
        <div class="progress-bar" id="quiz-progress-bar" style="width:0%"></div>
      </div>

      <div class="quiz-q-card">
        <div class="quiz-q-tag" id="quiz-cat-tag">场景</div>
        <div class="quiz-q-text" id="quiz-q-text">问题</div>
      </div>

      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-explanation" id="quiz-explanation"></div>
      <button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuizQuestion()">下一题 →</button>
    </div>

    <!-- Result screen -->
    <div class="quiz-result" id="quiz-result">

// STATE
// ════════════════════════════════════════════
let currentSection = 'home';
let currentCatId = 0;
let currentCardIdx = 0;
let isFlipped = false;

let quizPool = [];
let quizIdx = 0;
let quizScore = 0;
let quizSelectedCats = [];

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
function init() {
  // Build home categories
  const grid = document.getElementById('categories-grid');
  categories.forEach(cat => {
    const div = document.createElement('div');
    div.className = `category-card cat-${cat.id}`;
    div.onclick = () => openCategory(cat.id);
    div.innerHTML = `
      <div class="category-emoji">${cat.emoji}</div>
      <div class="category-title">${cat.title}</div>
      <div class="category-sub">${cat.sub}</div>
      <div class="category-count">${cat.cards.length} 张闪卡</div>
    `;
    grid.appendChild(div);
  });

  // Build quiz cat select
  const sel = document.getElementById('quiz-cat-select');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'quiz-cat-btn selected';
    btn.dataset.id = cat.id;
    btn.innerHTML = `${cat.emoji} ${cat.title}`;
    btn.onclick = () => {
      btn.classList.toggle('selected');
    };
    sel.appendChild(btn);
  });
}

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function showSection(name) {
  ['home','cards','quiz'].forEach(s => {
    document.getElementById('section-'+s).classList.toggle('hidden', s !== name);
  });
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['home','cards','quiz'][i] === name);
  });
  currentSection = name;
  if (name === 'quiz') resetQuiz();
}

// ════════════════════════════════════════════
// FLASHCARDS
// ════════════════════════════════════════════
function openCategory(id) {
  currentCatId = id;
  currentCardIdx = 0;
  isFlipped = false;
  const cat = categories[id];
  document.getElementById('fc-title').textContent = `${cat.emoji} ${cat.title}`;
  renderCard();
  buildCardList();
  showSection('cards');
}

function renderCard() {
  const cat = categories[currentCatId];
  const card = cat.cards[currentCardIdx];
  isFlipped = false;
  document.getElementById('fc-card').classList.remove('flipped');
  document.getElementById('fc-question').textContent = card.q;
  document.getElementById('fc-answer').style.whiteSpace = 'pre-line';
  document.getElementById('fc-answer').textContent = card.a;
  const pct = ((currentCardIdx+1)/cat.cards.length*100).toFixed(0);
  document.getElementById('fc-progress').textContent = `${currentCardIdx+1} / ${cat.cards.length}`;
  document.getElementById('fc-bar').style.width = pct + '%';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('fc-card').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  const cat = categories[currentCatId];
  currentCardIdx = (currentCardIdx + 1) % cat.cards.length;
  renderCard();
}

function prevCard() {
  const cat = categories[currentCatId];
  currentCardIdx = (currentCardIdx - 1 + cat.cards.length) % cat.cards.length;
  renderCard();
}

function buildCardList() {
  const cat = categories[currentCatId];
  const list = document.getElementById('fc-list');
  list.innerHTML = '<div style="font-size:12px;color:var(--gray-500);margin-bottom:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;">全部卡片（点击展开答案）</div>';
  cat.cards.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'card-list-item';
    item.innerHTML = `
      <div class="card-num">${i+1}</div>
      <div style="flex:1">
        <div class="card-list-q">${c.q}</div>
        <div class="card-list-a" style="white-space:pre-line">${c.a}</div>
      </div>
    `;
    item.onclick = () => {
      item.classList.toggle('open');
      currentCardIdx = i;
      renderCard();
    };
    list.appendChild(item);
  });
}

// ════════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════════
function resetQuiz() {
  document.getElementById('quiz-start').style.display = 'block';
  document.getElementById('quiz-question-wrap').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  quizIdx = 0; quizScore = 0;
}

function startQuiz() {
  const selectedBtns = document.querySelectorAll('.quiz-cat-btn.selected');
  quizSelectedCats = Array.from(selectedBtns).map(b => parseInt(b.dataset.id));
  if (quizSelectedCats.length === 0) {
    alert('请至少选择一个场景');
    return;
  }
  const catNames = quizSelectedCats.map(id => categories[id].title);
  quizPool = shuffle(quizQuestions.filter(q => catNames.includes(q.cat)));
  if (quizPool.length === 0) { alert('所选场景暂无题目'); return; }
  quizIdx = 0; quizScore = 0;
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-question-wrap').style.display = 'block';
  document.getElementById('quiz-result').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizPool[quizIdx];
  const total = quizPool.length;
  document.getElementById('quiz-progress-text').textContent = `第 ${quizIdx+1} 题 / 共 ${total} 题`;
  document.getElementById('quiz-score-badge').textContent = `得分: ${quizScore}`;
  document.getElementById('quiz-progress-bar').style.width = (quizIdx/total*100)+'%';
  document.getElementById('quiz-cat-tag').textContent = q.cat;
  document.getElementById('quiz-q-text').textContent = q.q;
  const optWrap = document.getElementById('quiz-options');
  optWrap.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => checkAnswer(i, q.ans, q.exp);
    optWrap.appendChild(btn);
  });
  document.getElementById('quiz-explanation').className = 'quiz-explanation';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
}

function checkAnswer(chosen, correct, exp) {
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((o,i) => {
    o.classList.add('disabled');
    if (i === correct) o.classList.add('correct');
    else if (i === chosen && chosen !== correct) o.classList.add('wrong');
  });
  if (chosen === correct) quizScore++;
  document.getElementById('quiz-score-badge').textContent = `得分: ${quizScore}`;
  const expEl = document.getElementById('quiz-explanation');
  expEl.innerHTML = `<strong>解析：</strong>${exp}`;
  expEl.classList.add('show');
  const nextBtn = document.getElementById('quiz-next-btn');
  nextBtn.textContent = quizIdx < quizPool.length-1 ? '下一题 →' : '查看结果';
  nextBtn.classList.add('show');
}

function nextQuizQuestion() {
  quizIdx++;
  if (quizIdx >= quizPool.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResult() {
  document.getElementById('quiz-question-wrap').style.display = 'none';
  const result = document.getElementById('quiz-result');
  result.style.display = 'block';
  const pct = Math.round(quizScore / quizPool.length * 100);
  document.getElementById('result-pct').textContent = pct + '%';
  document.querySelector('.result-circle').style.setProperty('--pct', pct+'%');
  let msg = '', sub = '';
  if (pct >= 90) { msg = '🏆 优秀！掌握扎实'; sub = `答对 ${quizScore}/${quizPool.length} 题，临床应用没问题！`; }
  else if (pct >= 70) { msg = '👍 良好，继续加油'; sub = `答对 ${quizScore}/${quizPool.length} 题，再巩固一下薄弱点。`; }
  else if (pct >= 50) { msg = '📖 需要复习'; sub = `答对 ${quizScore}/${quizPool.length} 题，建议回看闪卡再来一次。`; }
  else { msg = '💪 加油，多练习'; sub = `答对 ${quizScore}/${quizPool.length} 题，先仔细看知识点再自测。`; }
  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-sub').textContent = sub;
}

function retryQuiz() {
  quizPool = shuffle(quizPool);
  quizIdx = 0; quizScore = 0;
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-question-wrap').style.display = 'block';
  renderQuizQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── run ──
init();
</script>
